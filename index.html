<header>
    <div class="logo">FREE IPTV<span style="font-weight: 300; letter-spacing: 0.0073em; opacity: .5;">| Powered by </span>
    </div>
    <div id="menu"></div>
</header>

<div class="main-wrapper">
    <div class="player-section">
    <div class="player-frame" style="position: relative; overflow: hidden; background: #000; aspect-ratio: 16/9; border-radius: 8px;">
        <div id="player" style="width: 100%; height: 100%;"></div>
        
        <div id="ad-container" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999;">
            <video id="ad-video" width="100%" height="100%" style="object-fit: cover;" playsinline></video>
            
            <div style="position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px; display: flex; items-center: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); z-index: 10003;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #10b981;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                Sponsored
            </div>
            
            <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.2); z-index: 10001;">
                <div id="ad-progress-fill" style="width: 0%; height: 100%; background: #e50914; transition: width 0.05s linear;"></div>
            </div>

            <div id="skip-btn" onclick="skipNow(event)" style="cursor: pointer;">
                <span>Skip</span>
                <div class="yt-skip-icon">
                    <svg fill="none" height="24" viewBox="0 0 24 24" width="24">
                        <path d="M20 20C20.26 20 20.51 19.89 20.70 19.70C20.89 19.51 21 19.26 21 19V5C21 4.73 20.89 4.48 20.70 4.29C20.51 4.10 20.26 4 20 4C19.73 4 19.48 4.10 19.29 4.29C19.10 4.48 19 4.73 19 5V19C19 19.26 19.10 19.51 19.29 19.70C19.48 19.89 19.73 20 20 20ZM5.04 19.77L18 12L5.04 4.22C4.84 4.10 4.60 4.03 4.36 4.03C4.12 4.03 3.89 4.09 3.68 4.21C3.47 4.32 3.30 4.49 3.18 4.70C3.06 4.91 2.99 5.14 3 5.38V18.61C2.99 18.85 3.06 19.08 3.18 19.29C3.30 19.50 3.47 19.67 3.68 19.79C3.89 19.90 4.12 19.96 4.36 19.96C4.60 19.96 4.84 19.89 5.04 19.77Z" fill="white"></path>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        
        <div class="search-box">
            <input type="text" id="channelSearch" placeholder="Search channel..." onkeyup="filterChannels()">
        </div>

        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-label">Online Now</div>
                <div id="online-now" class="stat-value" style="color: var(--cyan);">0</div>
            </div>
            
            <div style="width: 1px; background: var(--border); margin: 0 10px;"></div>
        
            <div class="stat-item">
                <div class="stat-label">Today</div>
                <div id="daily-hits" class="stat-value" style="color: #ff9800;">0</div> </div>
        
            <div style="width: 1px; background: var(--border); margin: 0 10px;"></div>
        
            <div class="stat-item">
                <div class="stat-label">Total Visits</div>
                <div id="total-hits" class="stat-value">0</div>
            </div>
        </div>

        <div class="channel-grid" id="channel-container">
            <p id="status-msg" style="text-align:center; grid-column: 1/-1; opacity: 0.5;">Loading Playlist...</p>
        </div>
    </div>
</div>
